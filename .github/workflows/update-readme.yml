name: Update README with latest projects

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours automatically
  workflow_dispatch:          # allows manual trigger from GitHub
  push:
    branches: [main]          # runs on every push to main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: leonardoramcke
        run: python update_readme.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add README.md
          git diff --cached --quiet || git commit -m "auto: update projects list"
          git push
